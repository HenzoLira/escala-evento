<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalas do Evento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F3EE;
  --surface: #FFFFFF;
  --border: #E0DDD6;
  --text: #1A1916;
  --text-muted: #7A786F;
  --on-bg: #D6F0D6;
  --on-text: #1A6B1A;
  --on-border: #A3D9A3;
  --off-bg: #FAD9D9;
  --off-text: #8B1F1F;
  --off-border: #F0AAAA;
  --accent: #2D5A2D;
  --header-bg: #1A1916;
  --header-text: #F5F3EE;
  --total-bg: #F0EDE6;
  --tag-bg: #E8E4DC;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1.5rem 4rem;
}

/* ── TOP BAR ── */
.top-bar {
  max-width: 1200px;
  margin: 0 auto 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
  border-bottom: 2px solid var(--text);
  padding-bottom: 1rem;
}

.app-title {
  font-family: 'DM Mono', monospace;
  font-size: clamp(1.2rem, 2.5vw, 1.7rem);
  font-weight: 500;
  letter-spacing: -0.03em;
}

.legend {
  display: flex;
  gap: 14px;
  align-items: center;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}
.legend-dot { width: 13px; height: 13px; border-radius: 3px; border: 1px solid; }
.legend-dot.on  { background: var(--on-bg);  border-color: var(--on-border); }
.legend-dot.off { background: var(--off-bg); border-color: var(--off-border); }
.legend-dot.em  { background: var(--surface); border-color: var(--border); }

/* ── TABS ── */
.tabs-wrapper {
  max-width: 1200px;
  margin: 0 auto 0;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.tab-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 8px 8px 0 0;
  border: 1.5px solid var(--border);
  border-bottom: none;
  background: var(--tag-bg);
  color: var(--text-muted);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  display: flex; align-items: center; gap: 6px;
  position: relative;
  top: 1px;
}
.tab-btn:hover { background: var(--surface); color: var(--text); }
.tab-btn.active { background: var(--surface); color: var(--text); border-color: var(--border); border-bottom-color: var(--surface); z-index: 2; }

.tab-close {
  font-size: 15px;
  line-height: 1;
  color: var(--text-muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 0 0 2px;
  transition: color 0.1s;
}
.tab-close:hover { color: var(--off-text); }

.tab-add {
  font-size: 18px;
  width: 32px; height: 32px;
  border-radius: 8px 8px 0 0;
  border: 1.5px dashed var(--border);
  border-bottom: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  position: relative; top: 1px;
}
.tab-add:hover { background: var(--surface); color: var(--accent); }

/* ── SCHEDULE PANEL ── */
.schedule-panel {
  max-width: 1200px;
  margin: 0 auto 2.5rem;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 0 10px 10px 10px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.06);
  overflow: hidden;
}

/* ── PANEL HEADER ── */
.panel-header {
  padding: 14px 18px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  background: var(--surface);
}

.panel-title-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 180px; }

.panel-title {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  background: transparent;
  border: none;
  outline: none;
  border-bottom: 1.5px dashed var(--border);
  padding: 2px 4px;
  min-width: 120px;
  max-width: 300px;
  transition: border-color 0.15s;
}
.panel-title:focus { border-bottom-color: var(--accent); }

.panel-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.ctrl-input {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 7px 12px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  width: 170px;
  transition: border-color 0.15s;
}
.ctrl-input:focus { border-color: var(--accent); }

.btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
  white-space: nowrap;
}
.btn:hover { background: var(--bg); border-color: var(--text-muted); }
.btn-green { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-green:hover { background: #1A3D1A; border-color: #1A3D1A; }
.btn-red { color: var(--off-text); border-color: var(--off-border); }
.btn-red:hover { background: var(--off-bg); }

.save-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  opacity: 0;
  transition: opacity 0.3s;
  margin-left: 4px;
}
.save-badge.show { opacity: 1; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; }

table { border-collapse: collapse; width: 100%; min-width: 700px; }

thead th {
  background: var(--header-bg);
  color: var(--header-text);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  padding: 9px 4px;
  text-align: center;
  white-space: nowrap;
  letter-spacing: 0.03em;
  position: sticky;
  top: 0;
  z-index: 10;
}
thead th.col-name {
  text-align: left;
  padding-left: 14px;
  min-width: 150px;
  position: sticky; left: 0; z-index: 11;
  background: var(--header-bg);
}
thead th.col-total-on { min-width: 64px; background: #0F2B0F; }
thead th.weekend-head { color: #F0AAAA; }

tbody tr:hover td { background: #FAFAF7 !important; }

td {
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 0;
}

td.col-name {
  padding: 0 14px;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface);
  position: sticky; left: 0; z-index: 5;
  border-right: 2px solid var(--border);
  height: 34px;
  white-space: nowrap;
}

td.col-total-on {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  background: #EAF3DE;
  padding: 0 6px;
  border-left: 2px solid var(--on-border);
}

td.col-total-day {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  background: var(--total-bg);
  padding: 0 4px;
}

.cell-btn {
  display: block;
  width: 100%;
  min-width: 36px;
  height: 34px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: transparent;
  transition: background 0.1s;
  user-select: none;
}
.cell-btn:hover { background: var(--bg); }
.cell-btn.on  { background: var(--on-bg);  color: var(--on-text); }
.cell-btn.off { background: var(--off-bg); color: var(--off-text); }

.totals-row td {
  background: var(--total-bg) !important;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  text-align: center;
  padding: 6px 4px;
  border-top: 2px solid var(--border);
}
.totals-row td.col-name {
  text-align: left;
  font-size: 11px;
  letter-spacing: 0.03em;
}
.totals-row td.col-total-on {
  background: #D6F0D6 !important;
}

.day-header { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.day-num { font-size: 11px; }
.day-wk { font-size: 9px; opacity: 0.55; }

/* ── ADD SCHEDULE BUTTON ── */
.add-schedule-wrap {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: flex-start;
}

.btn-add-schedule {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 10px 20px;
  border: 1.5px dashed var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  display: flex; align-items: center; gap: 8px;
}
.btn-add-schedule:hover { background: var(--surface); color: var(--accent); border-color: var(--accent); }

.footer-note {
  max-width: 1200px;
  margin: 2rem auto 0;
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  line-height: 1.7;
}
</style>
</head>
<body>

<div class="top-bar">
  <span class="app-title">Escalas do Evento</span>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot on"></span>ON</span>
    <span class="legend-item"><span class="legend-dot off"></span>OFF</span>
    <span class="legend-item"><span class="legend-dot em"></span>—</span>
  </div>
</div>

<div class="tabs-wrapper" id="tabs-wrapper"></div>

<div id="panels-container"></div>

<div class="add-schedule-wrap">
  <button class="btn-add-schedule" id="btn-add-schedule">＋ Nova escala</button>
</div>

<div class="footer-note">
  Clique em qualquer célula para alternar: vazio → ON → OFF → vazio.<br>
  Dados salvos automaticamente neste navegador.
</div>

<script>
const DAYS = 30;
const START = new Date(2025, 5, 3);
const WDAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const SKEY = 'multi_escala_v1';

let schedules = [];
let activeId = null;

function dates() {
  return Array.from({length: DAYS}, (_, i) => {
    const d = new Date(START);
    d.setDate(d.getDate() + i);
    return d;
  });
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function loadData() {
  try {
    const raw = localStorage.getItem(SKEY);
    if (raw) { schedules = JSON.parse(raw); }
  } catch(e) {}
  if (!schedules.length) {
    schedules = [newSchedule('Escala Principal')];
  }
  activeId = schedules[0].id;
}

function newSchedule(name) {
  return { id: uid(), name: name || 'Nova Escala', names: [], cells: {} };
}

function saveData() {
  try { localStorage.setItem(SKEY, JSON.stringify(schedules)); } catch(e) {}
}

function getSchedule(id) { return schedules.find(s => s.id === id); }

function ck(name, idx) { return name + '§' + idx; }
function encId(str) { return str.replace(/[^a-zA-Z0-9]/g, '_'); }

// ── TABS ──
function renderTabs() {
  const wrap = document.getElementById('tabs-wrapper');
  wrap.innerHTML = '';
  schedules.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (s.id === activeId ? ' active' : '');
    btn.dataset.id = s.id;

    const label = document.createElement('span');
    label.textContent = s.name;
    btn.appendChild(label);

    if (schedules.length > 1) {
      const cl = document.createElement('button');
      cl.className = 'tab-close';
      cl.title = 'Remover escala';
      cl.textContent = '×';
      cl.onclick = (e) => { e.stopPropagation(); removeSchedule(s.id); };
      btn.appendChild(cl);
    }

    btn.onclick = () => { activeId = s.id; renderAll(); };
    wrap.appendChild(btn);
  });

  const addTab = document.createElement('button');
  addTab.className = 'tab-add';
  addTab.title = 'Nova escala';
  addTab.textContent = '+';
  addTab.onclick = addSchedule;
  wrap.appendChild(addTab);
}

// ── PANELS ──
function renderAll() {
  renderTabs();
  const container = document.getElementById('panels-container');
  container.innerHTML = '';
  schedules.forEach(s => {
    if (s.id !== activeId) return;
    container.appendChild(buildPanel(s));
  });
}

function buildPanel(s) {
  const wrap = document.createElement('div');
  wrap.className = 'schedule-panel';
  wrap.id = 'panel_' + s.id;

  // header
  const header = document.createElement('div');
  header.className = 'panel-header';

  const titleWrap = document.createElement('div');
  titleWrap.className = 'panel-title-wrap';

  const titleInput = document.createElement('input');
  titleInput.className = 'panel-title';
  titleInput.value = s.name;
  titleInput.maxLength = 40;
  titleInput.onchange = () => {
    s.name = titleInput.value.trim() || 'Escala';
    saveData();
    renderTabs();
  };
  titleWrap.appendChild(titleInput);

  const saveBadge = document.createElement('span');
  saveBadge.className = 'save-badge';
  saveBadge.id = 'sb_' + s.id;
  saveBadge.textContent = '✓ salvo';
  titleWrap.appendChild(saveBadge);

  header.appendChild(titleWrap);

  const controls = document.createElement('div');
  controls.className = 'panel-controls';

  const inp = document.createElement('input');
  inp.className = 'ctrl-input';
  inp.placeholder = 'Nome do colaborador';
  inp.maxLength = 40;
  inp.id = 'inp_' + s.id;

  const btnAdd = document.createElement('button');
  btnAdd.className = 'btn btn-green';
  btnAdd.textContent = '+ Adicionar';
  btnAdd.onclick = () => addCollaborator(s.id);

  const btnClear = document.createElement('button');
  btnClear.className = 'btn btn-red';
  btnClear.textContent = 'Limpar dados';
  btnClear.onclick = () => clearSchedule(s.id);

  inp.onkeydown = e => { if (e.key === 'Enter') addCollaborator(s.id); };

  controls.appendChild(inp);
  controls.appendChild(btnAdd);
  controls.appendChild(btnClear);
  header.appendChild(controls);
  wrap.appendChild(header);

  // table
  const tableWrap = document.createElement('div');
  tableWrap.className = 'table-wrap';
  tableWrap.appendChild(buildTable(s));
  wrap.appendChild(tableWrap);

  return wrap;
}

function buildTable(s) {
  const ds = dates();
  const table = document.createElement('table');
  table.id = 'tbl_' + s.id;

  // thead
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');

  let th = document.createElement('th');
  th.className = 'col-name';
  th.textContent = 'COLABORADOR';
  hr.appendChild(th);

  ds.forEach((d, i) => {
    th = document.createElement('th');
    const wk = d.getDay();
    if (wk === 0 || wk === 6) th.className = 'weekend-head';
    th.innerHTML = `<div class="day-header"><span class="day-num">${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}</span><span class="day-wk">${WDAYS[wk]}</span></div>`;
    hr.appendChild(th);
  });

  th = document.createElement('th');
  th.className = 'col-total-on';
  th.innerHTML = 'DIAS<br>ON';
  hr.appendChild(th);

  thead.appendChild(hr);
  table.appendChild(thead);

  // tbody
  const tbody = document.createElement('tbody');
  tbody.id = 'tbody_' + s.id;

  s.names.forEach(name => {
    tbody.appendChild(buildRow(s, name, ds));
  });

  // totals row
  tbody.appendChild(buildTotalsRow(s, ds));

  table.appendChild(tbody);
  return table;
}

function buildRow(s, name, ds) {
  const tr = document.createElement('tr');
  tr.id = 'row_' + s.id + '_' + encId(name);

  let td = document.createElement('td');
  td.className = 'col-name';
  td.textContent = name;
  tr.appendChild(td);

  ds.forEach((_, i) => {
    td = document.createElement('td');
    const val = s.cells[ck(name, i)] || '';
    const btn = document.createElement('button');
    btn.id = 'c_' + s.id + '_' + encId(name) + '_' + i;
    btn.className = 'cell-btn' + (val ? ' ' + val.toLowerCase() : '');
    btn.textContent = val;
    btn.onclick = () => cycleCell(s.id, name, i);
    td.appendChild(btn);
    tr.appendChild(td);
  });

  td = document.createElement('td');
  td.className = 'col-total-on';
  td.id = 'rt_' + s.id + '_' + encId(name);
  const t = rowTotal(s, name);
  td.textContent = t > 0 ? t + ' dias' : '—';
  tr.appendChild(td);

  return tr;
}

function buildTotalsRow(s, ds) {
  const tr = document.createElement('tr');
  tr.className = 'totals-row';
  tr.id = 'totrow_' + s.id;

  let td = document.createElement('td');
  td.className = 'col-name';
  td.textContent = 'TOTAL ON / DIA';
  tr.appendChild(td);

  ds.forEach((_, i) => {
    td = document.createElement('td');
    td.className = 'col-total-day';
    td.id = 'dt_' + s.id + '_' + i;
    const t = dayTotal(s, i);
    td.textContent = t || '—';
    tr.appendChild(td);
  });

  td = document.createElement('td');
  td.className = 'col-total-on';
  tr.appendChild(td);

  return tr;
}

function cycleCell(sid, name, idx) {
  const s = getSchedule(sid);
  if (!s) return;
  const k = ck(name, idx);
  const cur = s.cells[k] || '';
  s.cells[k] = cur === '' ? 'ON' : cur === 'ON' ? 'OFF' : '';
  saveData();
  flashSave(sid);

  const btn = document.getElementById('c_' + sid + '_' + encId(name) + '_' + idx);
  if (btn) {
    const val = s.cells[k];
    btn.className = 'cell-btn' + (val ? ' ' + val.toLowerCase() : '');
    btn.textContent = val;
  }

  const rtEl = document.getElementById('rt_' + sid + '_' + encId(name));
  if (rtEl) { const t = rowTotal(s, name); rtEl.textContent = t > 0 ? t + ' dias' : '—'; }

  const dtEl = document.getElementById('dt_' + sid + '_' + idx);
  if (dtEl) { const t = dayTotal(s, idx); dtEl.textContent = t || '—'; }
}

function rowTotal(s, name) {
  return Array.from({length: DAYS}, (_, i) => s.cells[ck(name, i)] === 'ON' ? 1 : 0).reduce((a,b)=>a+b,0);
}
function dayTotal(s, idx) {
  return s.names.filter(n => s.cells[ck(n, idx)] === 'ON').length;
}

function flashSave(sid) {
  const el = document.getElementById('sb_' + sid);
  if (!el) return;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1500);
}

function addCollaborator(sid) {
  const s = getSchedule(sid);
  if (!s) return;
  const inp = document.getElementById('inp_' + sid);
  const name = inp.value.trim();
  if (!name || s.names.includes(name)) { inp.focus(); return; }
  s.names.push(name);
  saveData();
  flashSave(sid);

  const tbody = document.getElementById('tbody_' + sid);
  if (!tbody) return;
  const totRow = document.getElementById('totrow_' + sid);
  const ds = dates();
  const newRow = buildRow(s, name, ds);
  tbody.insertBefore(newRow, totRow);

  inp.value = '';
  inp.focus();
}

function clearSchedule(sid) {
  const s = getSchedule(sid);
  if (!s) return;
  if (!confirm('Limpar todos os dados de "' + s.name + '"?')) return;
  s.cells = {};
  saveData();
  renderAll();
}

function addSchedule() {
  const name = prompt('Nome da nova escala:', 'Nova Escala');
  if (name === null) return;
  const s = newSchedule(name.trim() || 'Nova Escala');
  schedules.push(s);
  activeId = s.id;
  saveData();
  renderAll();
}

function removeSchedule(sid) {
  if (!confirm('Remover esta escala?')) return;
  schedules = schedules.filter(s => s.id !== sid);
  if (activeId === sid) activeId = schedules[0]?.id || null;
  saveData();
  renderAll();
}

document.getElementById('btn-add-schedule').onclick = addSchedule;

loadData();
renderAll();
</script>
</body>
</html>
